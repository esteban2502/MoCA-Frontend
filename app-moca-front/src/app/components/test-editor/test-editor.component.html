<app-tabs></app-tabs>
<div class="container mt-5">
  <!-- Alerta de error elegante -->
  <div *ngIf="showError" class="alert alert-warning alert-dismissible fade show custom-alert" role="alert">
    <div class="d-flex align-items-center">
      <i class="fas fa-exclamation-triangle me-3"></i>
      <div class="flex-grow-1">
        <strong>¡Atención!</strong>
        <p class="mb-0 mt-1">{{ errorMessage }}</p>
      </div>
      <button type="button" class="btn-close" (click)="hideError()" aria-label="Close"></button>
    </div>
  </div>

  <div class="row">
    <h1 class="col-12 col-md-4">Configuración de Pruebas</h1>
    <div class="col-12 col-md-8">
      <div class="d-flex justify-content-end">
        <button
          (click)="open(newEntity)"
          ngbTooltip="Crear una nueva prueba"
          class="btnGreen"
        >
          Crear
        </button>
      </div>
    </div>

    <div class="table-responsive mt-2">
      <table class="table-custom">
        <thead>
          <tr>
            <th scope="col">Acciones</th>
            <th scope="col">Titulo</th>
            <th scope="col">Descripción</th>
            <th scope="col">Preguntas</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="
              let test of testList
                | paginate : { itemsPerPage: itemsPerPage, currentPage: p }
            "
          >
            <td>
              <div
                class="d-flex justify-content-center gap-md-2 p-md-0 p-4 align-items-center"
              >
                <div class="form-check form-switch">
                  <input
                    class="form-check-input fs-5"
                    type="checkbox"
                    role="switch"
                    id="switchCheckChecked"
                    [(ngModel)]="test.status"
                    (change)="changeStatus(test.id!)"
                    ngbTooltip="Cambiar estado de la prueba"
                  />
                </div>
                <button
                  [routerLink]="['/preguntas', test.id]"
                  ngbTooltip="Ver preguntas asociadas a esta prueba"
                  class="btn btn-success btn-circle"
                >
                  <i class="bi bi-question-lg"></i>
                </button>

                <button
                  class="btn btn-success btn-circle"
                  (click)="open(newEntity, test)"
                  ngbTooltip="Editar información de la prueba"
                >
                  <i class="bi bi-pencil-square"></i>
                </button>

                <button
                  class="btn-circle btn btn-danger d-flex align-items-center justify-content-center"
                  (click)="open(deleteEntity, test)"
                  ngbTooltip="Eliminar esta prueba"
                >
                  <i class="bi bi-trash3"></i>
                </button>
              </div>
            </td>
            <td>{{ test.title }}</td>
            <td class="text-wraper">{{ test.description }}</td>
            <td>{{ test.numQuestions }}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="d-flex justify-content-end mt-3">
      <pagination-controls
        (pageChange)="p = $event"
        previousLabel=""
        nextLabel=""
        [maxSize]="5"
      ></pagination-controls>
    </div>
  </div>
</div>

<ng-template #newEntity let-modal>
  <div newEntity class="modal-content modalCustom">
    <div class="modal-content">
      <div class="modal-header modalCustom">
        <span><img src="/logo-blanco.png" alt="" width="125px" /></span>

        <button
          type="button"
          (click)="modal.close('Close click')"
          class="btn-close"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="mb-2">
          <h1 *ngIf="mode === 'create'">Nueva Prueba</h1>
          <h1 *ngIf="mode === 'edit'">Editar Prueba</h1>
          <label for="">Titulo</label>
          <div class="col-12 mb-3">
            <input
              class="form-control"
              [(ngModel)]="newTest.title"
              type="text"
            />
          </div>
          <label for="">Descripción</label>
          <div class="col-12">
            <textarea
              class="form-control"
              [(ngModel)]="newTest.description"
              type="text"
              rows="4"
            ></textarea>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mb-3 px-3">
        <button
          type="button"
          class="btnRed"
          (click)="modal.close('Close click')"
        >
          <span>Cancelar</span>
        </button>
        <button (click)="createTest()" type="button" class="btnGreen">
          <span *ngIf="mode === 'create'">Crear</span>
          <span *ngIf="mode === 'edit'">Actualizar</span>
        </button>
      </div>
    </div>
  </div>
</ng-template>

<ng-template #deleteEntity let-modal>
  <div deleteEntity class="modal-content modalCustom">
    <div class="modal-content">
      <div class="modal-header modalCustom">
        <span><img src="/logo-blanco.png" alt="" width="125px" /></span>

        <button
          type="button"
          (click)="modal.close('Close click')"
          class="btn-close"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        Al confirmar, la prueba será eliminada.
        <small class="text-muted"
          >Esto solo será posible si no tiene preguntas asociadas.</small
        >
      </div>

      <div class="d-flex justify-content-end gap-2 mb-3 px-3">
        <button
          type="button"
          class="btnRed"
          (click)="modal.close('Close click')"
        >
          <span>Cancelar</span>
        </button>
        <button (click)="deleteTest(idAux)" type="button" class="btnGreen">
          <span>Confirmar</span>
        </button>
      </div>
    </div>
  </div>
</ng-template>
