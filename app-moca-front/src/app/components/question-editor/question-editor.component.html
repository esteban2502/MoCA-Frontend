<app-tabs></app-tabs>
<div class="container mt-5">
  <div class="row">
    <h1 class="col-12 col-md-8">Configuración de Preguntas</h1>
    <div class="col-12 col-md-4">
      <div class="d-flex justify-content-end">
        <button (click)="open(newEntity)" class="btnGreen">Crear</button>
      </div>
    </div>

    <div class="table-responsive mt-2">
      <table class="table-custom">
        <thead class="">
          <tr>
            <th scope="col">Acciones</th>
            <th scope="col">Pregunta</th>
            <th scope="col">Descripción</th>
            <th scope="col">Tipo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<ng-template #newEntity let-modal>
  <div newEntity class="modal-content modalCustom">
    <div class="modal-content">
      <div class="modal-header modalCustom">
        <span><img src="/logo-blanco.png" alt="" width="125px" /></span>

        <button
          type="button"
          (click)="modal.close('Close click')"
          class="btn-close"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="mb-2">
          <h1>Nueva Pregunta</h1>

          <label for="">Titulo</label>
          <div class="col-12 mb-3">
            <input class="form-control" type="text" />
          </div>
          <label for="">Descripción</label>
          <div class="col-12 mb-3"><input class="form-control" type="text" /></div>
          <label for="">Tipo</label>
          <select class="form-control form-control-select">
            <option value="" selected disabled>Seleccione</option>
          </select>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mb-3 px-3">
        <button
          type="button"
          class="btnRed"
          (click)="modal.close('Close click')"
        >
          <span>Cancelar</span>
        </button>
        <button type="button" class="btnGreen">
          <span>Crear</span>
        </button>
      </div>
    </div>
  </div>
</ng-template>
