<app-tabs></app-tabs>
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center my-3">
    <h1 class="mb-0">Configuración de Preguntas</h1>
    <button
      (click)="open(newEntity)"
      ngbTooltip="Crear una nueva pregunta"
      class="btnGreen"
    >
      Crear
    </button>
  </div>

    <div class="table-responsive mt-2">
      <table class="table-custom">
        <thead class="">
          <tr>
            <th class="text-center" scope="col">Acciones</th>
            <th scope="col">Pregunta</th>
            <th scope="col">Descripción</th>
            <th scope="col">Orden</th>
            <th scope="col">Puntaje Máximo</th>
            <th scope="col">Categoría</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="
              let q of questions
                | paginate : { itemsPerPage: itemsPerPage, currentPage: p }
            "
          >
            <td>
              <div
                class="d-flex justify-content-center gap-2 align-items-center"
              >
                <button
                  class="btn btn-success btn-circle"
                  (click)="open(newEntity, q)"
                  ngbTooltip="Editar información de la pregunta"
                >
                  <i class="bi bi-pencil-square"></i>
                </button>

                <button
                  class="btn-circle btn btn-danger d-flex align-items-center justify-content-center"
                  (click)="open(deleteEntity, q)"
                  ngbTooltip="Eliminar esta pregunta"
                >
                  <i class="bi bi-trash3"></i>
                </button>
              </div>
            </td>
            <td>{{ q.question }}</td>
            <td class="text-wraper">{{ q.description }}</td>
            <td class="text-wraper">{{ q.questionOrder}}</td>
            <td class="text-wraper">{{ q.maxScore || 'N/A' }}</td>
            <td class="text-wraper">{{ q.category.name }}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="d-flex justify-content-end mt-3">
      <pagination-controls
        (pageChange)="p = $event"
        previousLabel=""
        nextLabel=""
        [maxSize]="5"
      ></pagination-controls>
    </div>
</div>

<ng-template #newEntity let-modal>
  <div newEntity class="modal-content modalCustom">
    <div class="modal-content">
      <div class="modal-header" style="background: linear-gradient(135deg, #00804e, #00b377); color: white; border-bottom: none;">
        <div class="d-flex align-items-center">
          <img src="/logo-blanco.png" alt="Logo MoCA" style="height: 50px; width: auto;">
        </div>
        <button
          type="button"
          (click)="modal.close('Close click')"
          class="btn-close btn-close-white"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="mb-2">
          <h1 *ngIf="mode === 'create'">Nueva Pregunta</h1>
          <h1 *ngIf="mode === 'edit'">Editar Pregunta</h1>
          
          <!-- Mensaje de error -->
          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>
          <label for="">Titulo</label>
          <div class="col-12 mb-3">
            <input
              class="form-control"
              [(ngModel)]="newQuestion.question"
              type="text"
              placeholder="Ingrese el título de la pregunta"
            />
          </div>
          <label for="">Descripción</label>
          <div class="col-12">
            <textarea
              class="form-control"
              [(ngModel)]="newQuestion.description"
              type="text"
              rows="4"
              placeholder="Ingrese una descripción de la pregunta"
            ></textarea>
          </div>

          <label for="questionOrder">Orden</label>
          <div class="col-12 mb-3">
            <input
              id="questionOrder"
              class="form-control"
              [(ngModel)]="newQuestion.questionOrder"
              type="number"
              min="1"
              placeholder="Ingrese el orden de la pregunta"
            />
          </div>

          <label for="maxScore">Puntaje Máximo</label>
          <div class="col-12 mb-3">
            <input
              id="maxScore"
              class="form-control"
              [(ngModel)]="newQuestion.maxScore"
              type="number"
              min="1"
              placeholder="Ingrese el puntaje máximo de la pregunta"
            />
          </div>

          <label for="category">Categoría</label>
          <div class="col-12 mb-3">
            <select
              id="category"
              class="form-select"
              [(ngModel)]="newQuestion.category.id"
              [disabled]="mode === 'edit'"
            >
              <option  [ngValue]="null" disabled selected>
                Seleccione una categoría
              </option>
              <option *ngFor="let cat of categories" [ngValue]="cat.id">
                {{ cat.name }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mb-3 px-3">
        <button
          type="button"
          class="btnRed"
          (click)="modal.close('Close click')"
        >
          <span>Cancelar</span>
        </button>
        <button (click)="createQuestion()" type="button" class="btnGreen">
          <span *ngIf="mode === 'create'">Crear</span>
          <span *ngIf="mode === 'edit'">Actualizar</span>
        </button>
      </div>
    </div>
  </div>
</ng-template>

<ng-template #deleteEntity let-modal>
  <div deleteEntity class="modal-content modalCustom">
    <div class="modal-content">
      <div class="modal-header" style="background: linear-gradient(135deg, #00804e, #00b377); color: white; border-bottom: none;">
        <div class="d-flex align-items-center">
          <img src="/logo-blanco.png" alt="Logo MoCA" style="height: 50px; width: auto;">
        </div>
        <button
          type="button"
          (click)="modal.close('Close click')"
          class="btn-close btn-close-white"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">Al confirmar, la pregunta será eliminada.</div>

      <div class="d-flex justify-content-end gap-2 mb-3 px-3">
        <button
          type="button"
          class="btnRed"
          (click)="modal.close('Close click')"
        >
          <span>Cancelar</span>
        </button>
        <button (click)="deleteQuestion(idAux)" type="button" class="btnGreen">
          <span>Confirmar</span>
        </button>
      </div>
    </div>
  </div>
</ng-template>
