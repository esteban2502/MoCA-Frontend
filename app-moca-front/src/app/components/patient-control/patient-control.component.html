<app-tabs></app-tabs>
<div class="container mt-5">
  <h1>Seguimiento y Control</h1>

  <div class="d-flex justify-content-between align-items-center my-3">
    <div class="search-container">
      <div class="search-input-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input 
          class="form-control search-input" 
          type="text" 
          placeholder="Buscar pacientes..." 
          id="patientSearch"
        />
        <button class="search-clear-btn" type="button" title="Limpiar">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </div>
    <button class="btnGreen" ngbTooltip="Exportar información a Excel">
      Exportar
    </button>
  </div>

  <div class="table-responsive">
    <table class="table-custom">
      <thead class="">
        <tr>
          <th scope="col">Acciones</th>
          <th scope="col">Cedula</th>
          <th scope="col">Nombre</th>
          <th scope="col">Correo</th>
          <th scope="col">Genero</th>
          <th scope="col">Nacimiento</th>
        </tr>
      </thead>
      <tbody>
        <!-- Mensaje de carga -->
        <tr *ngIf="isLoading">
          <td colspan="6" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2 mb-0">Cargando pacientes...</p>
          </td>
        </tr>
        
        <!-- Mensaje de error -->
        <tr *ngIf="errorMessage && !isLoading">
          <td colspan="6" class="text-center py-4 text-danger">
            <i class="bi bi-exclamation-triangle me-2"></i>
            {{ errorMessage }}
          </td>
        </tr>
        
        <!-- Mensaje cuando no hay pacientes -->
        <tr *ngIf="!isLoading && !errorMessage && patients.length === 0">
          <td colspan="6" class="text-center py-4 text-muted">
            <i class="bi bi-person-x me-2"></i>
            No hay pacientes registrados aún.
          </td>
        </tr>
        
        <!-- Filas de pacientes -->
        <tr *ngFor="let patient of patients  | paginate : { itemsPerPage: itemsPerPage, currentPage: p }">
          <td>
            <!-- Botones de acción (por implementar) -->
            <div class="d-flex justify-content-center">
            </div>
          </td>
          <td>{{ patient.idNumber }}</td>
          <td>{{ patient.fullName }}</td>
          <td>{{ patient.email }}</td>
          <td>{{ patient.genero }}</td>
          <td>{{ patient.birthDate | date:'dd/MM/yyyy' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="d-flex justify-content-end mt-3">
    <pagination-controls
      (pageChange)="p = $event"
      previousLabel=""
      nextLabel=""
      [maxSize]="5"
    ></pagination-controls>
  </div>
</div>
